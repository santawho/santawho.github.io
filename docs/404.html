<!DOCTYPE html>
<html lang="en">
<head>
    <title>Page not found</title>
</head>
<body>
<noscript>You need to enable JavaScript to run this app.</noscript>
<script>
    const path = window.location.pathname;
    const appsPrefix = "/@apps/";
    if (path.startsWith(appsPrefix)) {
        const prefLen = appsPrefix.length;
        const end = path.indexOf("/", prefLen);
        if (end > prefLen) {
            const app = path.substring(prefLen, end);
            console.log("app = " + app);
        }
    }
</script>
<p>Page not found</p>
</body>
</html>
